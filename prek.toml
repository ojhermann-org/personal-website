[[repos]]
repo = "builtin"
hooks = [
  {id = "no-commit-to-branch"},
  {id = "trailing-whitespace"},
  {id = "end-of-file-fixer"},
  {id = "check-merge-conflict"},
  {id = "check-toml"},
  {id = "check-json"},
  {id = "detect-private-key"},
]

[[repos]]
repo = "local"
hooks = [
  {id = "format-check", name = "format-check", entry = "bun run format:check", language = "system", pass_filenames = false},
  {id = "typecheck",    name = "typecheck",    entry = "bun run typecheck",    language = "system", pass_filenames = false},
  {id = "build",        name = "build",        entry = "bun run build",        language = "system", pass_filenames = false},
]
